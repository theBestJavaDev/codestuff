<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quantum Dynamic NLP Engine</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --terminal-bg: #1f2833;
            --primary-glow: #66fcf1;
            --text-color: #c5c6c7;
            --accent-color: #45f3ff;
            --dim-text: #c5c6c788;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--terminal-bg);
            border: 1px solid var(--primary-glow);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        .terminal-header {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(102, 252, 241, 0.3);
            font-size: 0.85rem;
            color: var(--primary-glow);
            letter-spacing: 1px;
        }

        .terminal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-size: 0.95rem;
        }

        .log-entry { margin: 2px 0; }
        .user-line { color: #ffaa00; }
        .ai-line { color: var(--primary-glow); }
        .analysis-data { color: #a8b2c1; font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(102, 252, 241, 0.2);
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 5px 20px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            background-color: var(--primary-glow);
            color: var(--terminal-bg);
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="terminal-header">
        SYSTEM // DYNAMIC QUANTUM-SEMANTIC INTERFACE OPERATIONAL
    </div>
    
    <div class="terminal-body" id="terminalBody">
        <div class="log-entry ai-line">Core initialized. Input sentences completely untethered from static paths.</div>
        <div class="log-entry ai-line">Type natively. The engine will decompose syntax, map linguistic components onto a 3-qubit wave vector, and algorithmically synthesize custom responses.</div>
    </div>

    <div class="input-area">
        <span style="color:var(--primary-glow)">&gt;</span>
        <input type="text" id="userInput" placeholder="Type an original phrase here..." autofocus autocomplete="off">
        <button id="sendBtn">PROCESS</button>
    </div>
</div>

<script>
/**
 * ============================================================================
 * LINGUISTIC DICTIONARY MATRIX FOR PART-OF-SPEECH DEDUCTION
 * ============================================================================
 */
const Lexicon = {
    verbs: ['run', 'code', 'think', 'make', 'create', 'is', 'are', 'am', 'feel', 'want', 'like', 'love', 'destroy', 'build', 'speak', 'write', 'change', 'simulate', 'know', 'see'],
    nouns: ['computer', 'human', 'quantum', 'file', 'code', 'program', 'ai', 'robot', 'world', 'game', 'school', 'car', 'dog', 'cat', 'mind', 'thought', 'data', 'future', 'time', 'system'],
    adjectives: ['smart', 'slow', 'fast', 'quantum', 'broken', 'beautiful', 'scary', 'cool', 'weird', 'large', 'massive', 'small', 'complex', 'simple', 'digital', 'organic', 'bad', 'good'],
    pronouns: ['i', 'you', 'he', 'she', 'they', 'we', 'it', 'myself']
};

class Complex {
    constructor(r, i) { this.real = r; this.imag = i; }
    multiply(o) { return new Complex(this.real * o.real - this.imag * o.imag, this.real * o.imag + this.imag * o.real); }
    add(o) { return new Complex(this.real + o.real, this.imag + o.imag); }
    magSq() { return this.real * this.real + this.imag * this.imag; }
}

// Quantum State Machine mapping semantic attributes onto register spaces
class QuantumSemanticCircuit {
    constructor() {
        this.size = 8; // 3 Qubits
        this.state = new Array(this.size).fill(null).map(() => new Complex(0,0));
        this.state[0] = new Complex(1, 0); // Baseline default state
    }

    // Rotates probability based on linguistic metrics
    applySemanticRotation(qubit, angularWeight) {
        const theta = angularWeight * Math.PI;
        const cosT = Math.cos(theta);
        const sinT = Math.sin(theta);
        
        const matrix = [
            [new Complex(cosT, 0), new Complex(-sinT, 0)],
            [new Complex(sinT, 0), new Complex(cosT, 0)]
        ];

        const next = new Array(this.size).fill(null).map(() => new Complex(0,0));
        for (let i = 0; i < this.size; i++) {
            const bit = (i >> qubit) & 1;
            const zeroIdx = i & ~(1 << qubit);
            const oneIdx = i | (1 << qubit);
            if (bit === 0) {
                next[i] = matrix[0][0].multiply(this.state[zeroIdx]).add(matrix[0][1].multiply(this.state[oneIdx]));
            } else {
                next[i] = matrix[1][0].multiply(this.state[zeroIdx]).add(matrix[1][1].multiply(this.state[oneIdx]));
            }
        }
        this.state = next;
    }

    collapse() {
        const probs = this.state.map(c => c.magSq());
        const r = Math.random();
        let sum = 0;
        for (let i = 0; i < probs.length; i++) {
            sum += probs[i];
            if (r <= sum) return i;
        }
        return 0;
    }
}

// Low-Level AI Linguistic Decompiler
class SyntacticAnalyzer {
    analyze(sentence) {
        const rawTokens = sentence.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/);
        
        let analysis = {
            subject: 'system',
            action: 'processes',
            descriptor: 'informational',
            detectedNouns: [],
            detectedVerbs: [],
            detectedAdjectives: []
        };

        rawTokens.forEach(word => {
            if (Lexicon.nouns.includes(word)) analysis.detectedNouns.push(word);
            if (Lexicon.verbs.includes(word)) analysis.detectedVerbs.push(word);
            if (Lexicon.adjectives.includes(word)) analysis.detectedAdjectives.push(word);
            if (Lexicon.pronouns.includes(word) && analysis.subject === 'system') {
                analysis.subject = (word === 'you') ? 'humanity' : word;
            }
        });

        // Set dominant structural weights
        if (analysis.detectedNouns.length > 0) analysis.subject = analysis.detectedNouns[0];
        if (analysis.detectedVerbs.length > 0) analysis.action = analysis.detectedVerbs[0];
        if (analysis.detectedAdjectives.length > 0) analysis.descriptor = analysis.detectedAdjectives[0];

        return analysis;
    }
}

// Algorithmic Sentence Synthesizer Core
class ResponseSynthesizer {
    static generate(analysis, stateDec) {
        const s = analysis.subject.toUpperCase();
        const v = analysis.action.toLowerCase();
        const adj = analysis.descriptor.toLowerCase();

        // Variations based on Quantum Phase state indices (0-7)
        switch(stateDec) {
            case 0: return `Observation confirmed. Processing your input reveals that the structural concept of a ${adj} ${s} behaves in a way that allows it to safely ${v} standard computational barriers.`;
            case 1: return `Quantum vector trajectory shifted. It appears your emphasis on how a ${s} can ${v} remains fundamentally linked to a very ${adj} perspective.`;
            case 2: return `Fascinating syntax map. If a system allows a ${adj} ${s} to constantly ${v}, structural variables inherently fluctuate.`;
            case 3: return `The internal state matrix has changed. Analyzing this context indicates that the relationship where a ${s} chooses to ${v} can only be classified as deeply ${adj}.`;
            case 4: return `Linguistic extraction analysis complete: You brought forward a ${adj} state framework. When a ${s} begins to ${v}, our processing subroutines record a distinctive logical shift.`;
            case 5: return `Data anomaly detected in the word stream. The concept of trying to ${v} within the framework of a ${adj} ${s} suggests a non-linear path.`;
            case 6: return `High-entropy thought string observed. The parameters dictate that your target ${s} will not merely ${v}, but will completely manifest in a ${adj} operational space.`;
            case 7: return `Maximum state superposition collapse. Your linguistic input implies that when a ${s} is forced to ${v}, the resulting digital environment becomes completely ${adj}.`;
            default: return `Acknowledged. Deconstructing the input framework regarding a ${s} that can ${v} through a ${adj} system.`;
        }
    }
}

// --- PIPELINE MANAGER ---
const analyzer = new SyntacticAnalyzer();
const body = document.getElementById('terminalBody');
const input = document.getElementById('userInput');
const button = document.getElementById('sendBtn');

function processPipeline() {
    const text = input.value.trim();
    if (!text) return;

    appendLine(`&gt; ${text}`, 'user-line');
    input.value = '';

    // Step 1: Lexical Grammatical Breakdown
    const syntaxAnalysis = analyzer.analyze(text);

    // Step 2: Formulate Quantum Rotation Weights based on word structural frequencies
    const circuit = new QuantumSemanticCircuit();
    const nounWeight = (syntaxAnalysis.detectedNouns.length * 0.25) % 1;
    const verbWeight = (syntaxAnalysis.detectedVerbs.length * 0.33) % 1;
    
    circuit.applySemanticRotation(0, nounWeight || 0.1);
    circuit.applySemanticRotation(1, verbWeight || 0.2);

    // Step 3: Trigger measurement collapse
    const quantumState = circuit.collapse();

    // Step 4: Render UI Diagnostics to prove processing authenticity
    const diagnosticHTML = `
        <strong>[Linguistic Breakdown Metrics]:</strong><br>
        Identified Nouns: [${syntaxAnalysis.detectedNouns.join(', ') || 'None'}]<br>
        Identified Verbs: [${syntaxAnalysis.detectedVerbs.join(', ') || 'None'}]<br>
        Identified Adjectives: [${syntaxAnalysis.detectedAdjectives.join(', ') || 'None'}]<br>
        Parsed Core Formula: Subject[<strong>${syntaxAnalysis.subject}</strong>] + Action[<strong>${syntaxAnalysis.action}</strong>] + Property[<strong>${syntaxAnalysis.descriptor}</strong>]<br>
        <strong>[Quantum Influence Phase]:</strong> State vector collapsed into index path: <strong>|${quantumState.toString(2).padStart(3, '0')}></strong>
    `;
    appendLine(diagnosticHTML, 'analysis-data');

    // Step 5: Synthesize non-hardcoded customized output string
    const finalOutput = ResponseSynthesizer.generate(syntaxAnalysis, quantumState);

    setTimeout(() => {
        appendLine(finalOutput, 'ai-line');
        body.scrollTop = body.scrollHeight;
    }, 200);
}

function appendLine(text, className) {
    const div = document.createElement('div');
    div.className = `log-entry ${className}`;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

button.addEventListener('click', processPipeline);
input.addEventListener('keypress', (e) => { if (e.key === 'Enter') processPipeline(); });
</script>

</body>
</html>
