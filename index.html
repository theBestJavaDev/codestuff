<body>

id="username"

id="password"
type="password"
placeholder="Password">

<button id="register">

<h3>Online</h3>

<div id="onlineList"></div>

</div>

<div id="main">

<div id="messages"></div>

<div id="typing"></div>

id="msg"
placeholder="Type a message...">

Send

</div>

</div>

</div>

</div>

<script>

// Replace these with yours

const SUPABASE_URL="https://supabase.com/dashboard/project/zwsosuqgbcdrrsnodrph";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3c29zdXFnYmNkcnJzbm9kcnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjE5MzYsImV4cCI6MjA5OTc5NzkzNn0.10CK9gekKUp8igIkokSOpYccN1ddGMqDOxYIq5jCV-o";

const supabase=supabase.createClient(
https://supabase.com/dashboard/project/zwsosuqgbcdrrsnodrph,
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3c29zdXFnYmNkcnJzbm9kcnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjE5MzYsImV4cCI6MjA5OTc5NzkzNn0.10CK9gekKUp8igIkokSOpYccN1ddGMqDOxYIq5jCV-o
);

let currentUser=null;

const login=document.getElementById("login");
const chat=document.getElementById("chat");

const username=document.getElementById("username");
const password=document.getElementById("password");

const register=document.getElementById("register");
const signin=document.getElementById("signin");

const messages=document.getElementById("messages");
const onlineList=document.getElementById("onlineList");

const msg=document.getElementById("msg");
const send=document.getElementById("send");

const typing=document.getElementById("typing");
let channel;


// Load chat after login
async function openChat(user){

    currentUser=user;

    login.style.display="none";
    chat.style.display="block";

    await setOnline();

    loadMessages();

    subscribeMessages();

    subscribeUsers();

}


// Set user online
async function setOnline(){

    await supabase
    .from("profiles")
    .update({
        online:true,
        last_seen:new Date()
    })
    .eq("id",currentUser.id);

}


// Logout / leaving page
window.addEventListener("beforeunload",async()=>{

    if(currentUser){

        await supabase
        .from("profiles")
        .update({
            online:false,
            last_seen:new Date()
        })
        .eq("id",currentUser.id);

    }

});
// Load existing messages
async function loadMessages(){

    const {data,error}=await supabase
    .from("messages")
    .select("*")
    .order("created_at",{ascending:true});


    if(error){
        console.log(error);
        return;
    }


    messages.innerHTML="";


    data.forEach(message=>{

        addMessage(message);

    });

}


// Display a message
function addMessage(message){

    const div=document.createElement("div");

    div.className="message";

    div.innerHTML=`
        <b>${escapeHTML(message.username)}</b><br>
        ${escapeHTML(message.message)}
        <small style="color:#aaa;display:block;margin-top:5px">
        ${new Date(message.created_at).toLocaleTimeString()}
        </small>
    `;


    messages.appendChild(div);

    messages.scrollTop=messages.scrollHeight;

}



// Prevent HTML injection
function escapeHTML(text){

    return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}



// Send message
async function sendMessage(){

    const text=msg.value.trim();


    if(!text || !currentUser){
        return;
    }


    const {data,error}=await supabase
    .from("messages")
    .insert({

        user_id:currentUser.id,

        username:currentUser.username,

        message:text

    });


    if(error){

        console.log(error);

        return;

    }


    msg.value="";

}



send.onclick=sendMessage;



msg.addEventListener("keydown",e=>{

    if(e.key==="Enter"){

        sendMessage();

    }

});




// Realtime message listener
function subscribeMessages(){

    supabase
    .channel("messages-room")

    .on(
        "postgres_changes",
        {
            event:"INSERT",
            schema:"public",
            table:"messages"
        },

        payload=>{

            addMessage(payload.new);

        }

    )

    .subscribe();

}

// Load and update online users
async function loadOnlineUsers(){

    const {data,error}=await supabase
    .from("profiles")
    .select("username")
    .eq("online",true);


    if(error){

        console.log(error);
        return;

    }


    onlineList.innerHTML="";


    data.forEach(user=>{

        const div=document.createElement("div");

        div.className="user";

        div.innerHTML=`
        🟢 ${escapeHTML(user.username)}
        `;

        onlineList.appendChild(div);

    });

}



// Realtime online users
function subscribeUsers(){

    loadOnlineUsers();


    supabase
    .channel("online-users")

    .on(
        "postgres_changes",
        {
            event:"*",
            schema:"public",
            table:"profiles"
        },

        ()=>{

            loadOnlineUsers();

        }

    )

    .subscribe();

}



// Update online status when tab closes
setInterval(async()=>{

    if(currentUser){

        await supabase
        .from("profiles")
        .update({

            online:true,

            last_seen:new Date()

        })

        .eq(
            "id",
            currentUser.id
        );

    }

},30000);



// Login button placeholder
signin.onclick=async()=>{

    alert(
        "Connect this button to your Supabase Auth login."
    );

};



// Register button placeholder
register.onclick=async()=>{

    alert(
        "Connect this button to your Supabase Auth signup."
    );

};
// ===============================
// SUPABASE AUTH CONNECTION
// ===============================

// Example login using hidden email mapping.
// User only enters a username.
// The email is generated internally.

async function loginUser(){

    const name = username.value.trim();
    const pass = password.value.trim();


    if(!name || !pass){

        alert("Enter username and password");
        return;

    }


    const fakeEmail = 
        name.toLowerCase() + "@chat.local";


    const {data,error}=await supabase.auth.signInWithPassword({

        email:fakeEmail,

        password:pass

    });


    if(error){

        alert(error.message);
        return;

    }


    const {data:profile}=await supabase
    .from("profiles")
    .select("*")
    .eq("id",data.user.id)
    .single();


    openChat({

        id:data.user.id,

        username:profile.username

    });

}



// Create account

async function createAccount(){

    const name=username.value.trim();
    const pass=password.value.trim();


    if(!name || !pass){

        alert("Enter username and password");
        return;

    }


    const fakeEmail=
        name.toLowerCase()+"@chat.local";


    const {data,error}=await supabase.auth.signUp({

        email:fakeEmail,

        password:pass

    });


    if(error){

        alert(error.message);
        return;

    }



    await supabase
    .from("profiles")
    .insert({

        id:data.user.id,

        username:name,

        online:true

    });



    alert("Account created");


    openChat({

        id:data.user.id,

        username:name

    });

}



register.onclick=createAccount;

signin.onclick=loginUser;



// Restore session after refresh

async function checkSession(){

    const {

        data:{session}

    }=await supabase.auth.getSession();



    if(session){


        const {data:profile}=await supabase
        .from("profiles")
        .select("*")
        .eq("id",session.user.id)
        .single();



        if(profile){

            openChat({

                id:session.user.id,

                username:profile.username

            });

        }

    }

}


checkSession();
</script>

</body>
</html>
