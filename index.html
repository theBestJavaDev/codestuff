<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #1e1f22;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

#login {
  width: 350px;
  background: #2b2d31;
  padding: 25px;
  border-radius: 10px;
}

#chat {
  display: none;
  width: 95%;
  height: 95vh;
  background: #2b2d31;
  border-radius: 10px;
  overflow: hidden;
}

h2 {
  margin-bottom: 20px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  outline: none;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  background: #5865F2;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #4752c4;
}

#container {
  display: flex;
  height: 100%;
}

#users {
  width: 220px;
  background: #232428;
  padding: 15px;
  overflow-y: auto;
}

#users h3 {
  margin-bottom: 15px;
}

.user {
  padding: 8px;
  margin-bottom: 6px;
  background: #313338;
  border-radius: 5px;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  background: #313338;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.message b {
  color: #6aa7ff;
}

#bottom {
  display: flex;
  padding: 15px;
  background: #232428;
}

#msg {
  flex: 1;
  margin: 0;
}

#send {
  width: 120px;
  margin-left: 10px;
}

#typing {
  padding-left: 20px;
  padding-bottom: 10px;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>

<body>
<div id="login">
  <h2>Supabase Chat</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="register">Create Account</button>
  <button id="signin">Login</button>
</div>

<div id="chat">
  <div id="container">
    <div id="users">
      <h3>Online</h3>
      <div id="onlineList"></div>
    </div>

    <div id="main">
      <div id="messages"></div>
      <div id="typing"></div>

      <div id="bottom">
        <input id="msg" placeholder="Type a message...">
        <button id="send">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://zwsosuqgbcdrrsnodrph.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let messageChannel = null;
let usersChannel = null;

const login = document.getElementById("login");
const chat = document.getElementById("chat");
const username = document.getElementById("username");
const password = document.getElementById("password");
const register = document.getElementById("register");
const signin = document.getElementById("signin");
const messages = document.getElementById("messages");
const onlineList = document.getElementById("onlineList");
const msg = document.getElementById("msg");
const send = document.getElementById("send");

function escapeHTML(text) {
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function setOnline() {
  await supabase
    .from("profiles")
    .update({
      online: true,
      last_seen: new Date().toISOString()
    })
    .eq("id", currentUser.id);
}

async function openChat(user) {
  currentUser = user;
  login.style.display = "none";
  chat.style.display = "block";

  await setOnline();
  await loadMessages();
  await subscribeMessages();
  await subscribeUsers();
}

window.addEventListener("beforeunload", () => {
  if (currentUser) {
    supabase
      .from("profiles")
      .update({
        online: false,
        last_seen: new Date().toISOString()
      })
      .eq("id", currentUser.id);
  }
});

async function loadMessages() {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.log(error);
    return;
  }

  messages.innerHTML = "";
  data.forEach(message => addMessage(message));
}

function addMessage(message) {
  const div = document.createElement("div");
  div.className = "message";

  const time = new Date(message.created_at).toLocaleTimeString();
  div.innerHTML =
    "<b>" + escapeHTML(message.username) + "</b><br>" +
    escapeHTML(message.message) +
    "<small style='color:#aaa;display:block;margin-top:5px'>" +
    escapeHTML(time) +
    "</small>";

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = msg.value.trim();
  if (!text || !currentUser) return;

  const { error } = await supabase
    .from("messages")
    .insert({
      user_id: currentUser.id,
      username: currentUser.username,
      message: text
    });

  if (error) {
    console.log(error);
    return;
  }

  msg.value = "";
}

send.onclick = sendMessage;

msg.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

async function subscribeMessages() {
  if (messageChannel) {
    await supabase.removeChannel(messageChannel);
  }

  messageChannel = supabase
    .channel("messages-room")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      payload => addMessage(payload.new)
    )
    .subscribe();
}

async function loadOnlineUsers() {
  const { data, error } = await supabase
    .from("profiles")
    .select("username")
    .eq("online", true);

  if (error) {
    console.log(error);
    return;
  }

  onlineList.innerHTML = "";

  data.forEach(user => {
    const div = document.createElement("div");
    div.className = "user";
    div.innerHTML = "🟢 " + escapeHTML(user.username);
    onlineList.appendChild(div);
  });
}

async function subscribeUsers() {
  await loadOnlineUsers();

  if (usersChannel) {
    await supabase.removeChannel(usersChannel);
  }

  usersChannel = supabase
    .channel("online-users")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "profiles" },
      () => loadOnlineUsers()
    )
    .subscribe();
}

setInterval(async () => {
  if (currentUser) {
    await supabase
      .from("profiles")
      .update({
        online: true,
        last_seen: new Date().toISOString()
      })
      .eq("id", currentUser.id);
  }
}, 30000);

async function loginUser() {
  const name = username.value.trim();
  const pass = password.value.trim();

  if (!name || !pass) {
    alert("Enter username and password");
    return;
  }

  const fakeEmail = name.toLowerCase() + "@chat.local";

  const { data, error } = await supabase.auth.signInWithPassword({
    email: fakeEmail,
    password: pass
  });

  if (error) {
    alert(error.message);
    return;
  }

  const { data: profile, error: profileError } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .single();

  if (profileError) {
    alert(profileError.message);
    return;
  }

  openChat({
    id: data.user.id,
    username: profile.username
  });
}

async function createAccount() {
  const name = username.value.trim();
  const pass = password.value.trim();

  if (!name || !pass) {
    alert("Enter username and password");
    return;
  }

  const fakeEmail = name.toLowerCase() + "@chat.local";

  const { data, error } = await supabase.auth.signUp({
    email: fakeEmail,
    password: pass
  });

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.user) {
    alert("Account created, but no user was returned.");
    return;
  }

  const { error: profileError } = await supabase
    .from("profiles")
    .insert({
      id: data.user.id,
      username: name,
      online: true,
      last_seen: new Date().toISOString()
    });

  if (profileError) {
    alert(profileError.message);
    return;
  }

  alert("Account created");
  openChat({
    id: data.user.id,
    username: name
  });
}

register.onclick = createAccount;
signin.onclick = loginUser;

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", session.user.id)
      .single();

    if (profile) {
      openChat({
        id: session.user.id,
        username: profile.username
      });
    }
  }
}

checkSession();
</script>
</body>
</html>
