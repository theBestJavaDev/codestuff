<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI Terminal</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --terminal-bg: #151722;
            --primary-glow: #00ffcc;
            --text-color: #c5cdd8;
            --accent-color: #ff007f;
            --dim-text: #626875;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 850px;
            background-color: var(--terminal-bg);
            border: 2px solid var(--primary-glow);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }

        .terminal-header {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--dim-text);
        }
        .dot.active { background-color: var(--accent-color); }

        .terminal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .log-entry { margin: 5px 0; }
        .user-line { color: var(--accent-color); font-weight: bold; }
        .ai-line { color: var(--primary-glow); }
        .quantum-data { color: var(--dim-text); font-size: 0.85rem; padding-left: 15px; border-left: 1px dashed var(--dim-text); }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(0, 255, 204, 0.2);
            gap: 10px;
        }

        .prefix {
            color: var(--accent-color);
            font-weight: bold;
            align-self: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-glow);
            color: var(--terminal-bg);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="terminal-header">
        <span>QuantumNLP-v1.0.0 // GitHub Pages Engine</span>
        <div class="window-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
        </div>
    </div>
    
    <div class="terminal-body" id="terminalBody">
        <div class="log-entry ai-line">System initialized. 3-Qubit simulator offline pipeline ready.</div>
        <div class="log-entry ai-line">Type a command to communicate. Try saying "hello", "flip a coin", or "initialize chaos mode".</div>
    </div>

    <div class="input-area">
        <span class="prefix">ψ></span>
        <input type="text" id="userInput" placeholder="Ask the quantum core..." autofocus autocomplete="off">
        <button id="sendBtn">EXECUTE</button>
    </div>
</div>

<script>
/**
 * ============================================================================
 * ENGINE ARCHITECTURE (COMPACT DIRECT MATH BINDINGS)
 * ============================================================================
 */

class Complex {
    constructor(r, i) { this.real = r; this.imag = i; }
    multiply(o) { return new Complex(this.real * o.real - this.imag * o.imag, this.real * o.imag + this.imag * o.real); }
    add(o) { return new Complex(this.real + o.real, this.imag + o.imag); }
    magSq() { return this.real * this.real + this.imag * this.imag; }
}

class QuantumCircuit {
    constructor(numQubits) {
        this.numQubits = numQubits;
        this.size = Math.pow(2, numQubits);
        this.state = new Array(this.size).fill(null).map(() => new Complex(0,0));
        this.state[0] = new Complex(1, 0); // Ground state |000>
    }

    applyGate(matrix, target) {
        const next = new Array(this.size).fill(null).map(() => new Complex(0,0));
        for (let i = 0; i < this.size; i++) {
            const bit = (i >> target) & 1;
            const zeroIdx = i & ~(1 << target);
            const oneIdx = i | (1 << target);
            if (bit === 0) {
                next[i] = matrix[0][0].multiply(this.state[zeroIdx]).add(matrix[0][1].multiply(this.state[oneIdx]));
            } else {
                next[i] = matrix[1][0].multiply(this.state[zeroIdx]).add(matrix[1][1].multiply(this.state[oneIdx]));
            }
        }
        this.state = next;
    }

    h(q) {
        const factor = 1 / Math.sqrt(2);
        this.applyGate([
            [new Complex(factor, 0), new Complex(factor, 0)],
            [new Complex(factor, 0), new Complex(-factor, 0)]
        ], q);
    }

    x(q) {
        this.applyGate([[new Complex(0,0), new Complex(1,0)], [new Complex(1,0), new Complex(0,0)]], q);
    }

    measure() {
        const probs = this.state.map(c => c.magSq());
        const r = Math.random();
        let sum = 0;
        for (let i = 0; i < probs.length; i++) {
            sum += probs[i];
            if (r <= sum) return i;
        }
        return this.size - 1;
    }
}

class LowLevelAI {
    constructor() {
        this.intents = {};
        this.stops = new Set(['a', 'an', 'the', 'is', 'are', 'you', 'to', 'can', 'do', 'please', 'me', 'for']);
    }
    register(name, phrases, effect) {
        this.intents[name] = { phrases: phrases.map(p => this.tokenize(p)), effect };
    }
    tokenize(t) {
        return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 0 && !this.stops.has(w));
    }
    decode(input) {
        const tokens = this.tokenize(input);
        let match = 'unknown'; let high = 0.15;
        for (const [name, data] of Object.entries(this.intents)) {
            for (const pTokens of data.phrases) {
                const set = new Set(tokens);
                const hits = pTokens.filter(t => set.has(t));
                const score = tokens.length ? hits.length / Math.max(tokens.length, pTokens.length) : 0;
                if (score > high) { high = score; match = name; }
            }
        }
        return match;
    }
}

// --- INITIALIZE & ORCHESTRATE ---
const ai = new LowLevelAI();
ai.register('greeting', ['hello', 'hi', 'greetings', 'hey computer', 'wake up'], () => {});
ai.register('coin_flip', ['flip coin', 'heads tails', 'random choice', 'generate outcome'], c => c.h(0));
ai.register('chaos_mode', ['maximum chaos', 'unpredictable state', 'initialize noise', 'superposition'], c => { c.h(0); c.h(1); c.x(2); c.h(2); });

const responseMatrix = {
    'greeting': { 0: "Hello, organic consciousness. Vector maps stable.", default: "System online. Standing by for state manipulation commands." },
    'coin_flip': { 0: "Quantum superposition collapsed cleanly to: HEADS.", 1: "Quantum superposition collapsed cleanly to: TAILS.", default: "Coin logic unresolved outside bounds." },
    'chaos_mode': { 0: "|000> Quiet convergence state.", 3: "|011> High localized entropy signature.", 5: "|101> Asymmetric state vector collision detected.", 7: "|111> Absolute timeline maximum noise variance registered.", default: "Distributed multi-qubit configuration stable across localized chaos vectors." },
    'unknown': { default: "Intent pattern fell below processing threshold. Use 'flip a coin' or 'maximum chaos' to alter states." }
};

// UI Handling Pipeline
const body = document.getElementById('terminalBody');
const input = document.getElementById('userInput');
const button = document.getElementById('sendBtn');

function process() {
    const text = input.value.trim();
    if (!text) return;

    // Log user text
    appendLine(`&gt; ${text}`, 'user-line');
    input.value = '';

    // Step 1: Parse intent via low level AI
    const intent = ai.decode(text);
    
    // Step 2: Initialize 3-qubit array
    const circuit = new QuantumCircuit(3);
    if (ai.intents[intent]) ai.intents[intent].effect(circuit);

    // Step 3: Measure Collapse
    const outcome = circuit.measure();
    const binaryStr = outcome.toString(2).padStart(3, '0');

    // Step 4: UI Engine output assembly
    appendLine(`[AI Engine] Intent Detected: ${intent.toUpperCase()}`, 'ai-line');
    appendLine(`[Quantum Engine] Measurement complete. State vector collapsed to |${binaryStr}&gt; (Dec: ${outcome})`, 'quantum-data');
    
    const cat = responseMatrix[intent] || responseMatrix['unknown'];
    const reply = cat[outcome] || cat['default'];
    
    setTimeout(() => {
        appendLine(reply, 'ai-line');
        body.scrollTop = body.scrollHeight;
    }, 150);
}

function appendLine(text, className) {
    const div = document.createElement('div');
    div.className = `log-entry ${className}`;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

button.addEventListener('click', process);
input.addEventListener('keypress', (e) => { if (e.key === 'Enter') process(); });
</script>

</body>
</html>
