<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Public Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #374151;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .topbar, .panel {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      min-height: 72vh;
    }
    .hidden { display: none !important; }
    .split {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1, h2, p { margin: 0 0 12px; }
    .muted { color: var(--muted); }
    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    input, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font: inherit;
    }
    textarea { min-height: 54px; resize: vertical; }
    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: #1d4ed8;
    }
    button.secondary { background: #334155; }
    button.success { background: #16a34a; }
    button.danger { background: #b91c1c; }
    .row { display: grid; gap: 10px; }
    .two { grid-template-columns: 1fr 1fr; gap: 10px; }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .messages {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(15,23,42,0.75);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 420px;
    }
    .msg {
      max-width: 70%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel2);
    }
    .msg.me {
      margin-left: auto;
      background: rgba(34,197,94,0.15);
      border-color: rgba(34,197,94,0.35);
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .users {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 70vh;
      overflow: auto;
    }
    .user {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(31,41,55,0.8);
      border: 1px solid var(--border);
    }
    .error { color: #fca5a5; }
    .ok { color: #86efac; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app">
    <div class="topbar split">
      <div>
        <h1>Public Chat</h1>
        <div class="muted">Username profile + realtime messages in one room.</div>
      </div>
      <div id="sessionStatus" class="status">Not signed in</div>
    </div>

    <div id="authView" class="panel">
      <div class="auth-tabs">
        <button id="showLoginBtn" class="secondary">Login</button>
        <button id="showSignupBtn">Sign Up</button>
      </div>

      <div id="loginForm" class="row">
        <h2>Login</h2>
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <button id="loginBtn">Login</button>
      </div>

      <div id="signupForm" class="row hidden">
        <h2>Sign Up</h2>
        <input id="signupUsername" type="text" placeholder="Username" />
        <input id="signupEmail" type="email" placeholder="Email" />
        <input id="signupPassword" type="password" placeholder="Password" />
        <button id="signupBtn">Create Account</button>
      </div>

      <p id="authMsg" class="muted"></p>
    </div>

    <div id="appView" class="grid hidden">
      <div class="panel">
        <div class="split">
          <h2>Online Users</h2>
          <button id="refreshUsersBtn" class="secondary" style="width:auto;">Refresh</button>
        </div>
        <div id="usersList" class="users"></div>
      </div>

      <div class="panel" style="display:grid; grid-template-rows:auto 1fr auto; gap:12px;">
        <div class="split">
          <div>
            <h2>Global Room</h2>
            <div class="muted">Everyone sees the same messages.</div>
          </div>
          <button id="logoutBtn" class="danger" style="width:auto;">Logout</button>
        </div>

        <div id="messages" class="messages"></div>

        <form id="messageForm" class="row">
          <textarea id="messageInput" placeholder="Type a message..."></textarea>
          <button type="submit" class="success">Send</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vvavdtlhrxeksyvmndpr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2YXZkdGxocnhla3N5dm1uZHByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjI4NzIsImV4cCI6MjA5OTc5ODg3Mn0.SInEYYuBOMEuOgeFOkFB1DyuEJplz9rDfgnA18qcb3Q";
    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");
    const authMsg = document.getElementById("authMsg");
    const sessionStatus = document.getElementById("sessionStatus");
    const usersList = document.getElementById("usersList");
    const messagesEl = document.getElementById("messages");

    let currentUser = null;
    let myProfile = null;
    let channel = null;

    function setMsg(text, ok = false) {
      authMsg.textContent = text;
      authMsg.className = ok ? "muted ok" : "muted error";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showLogin() {
      loginForm.classList.remove("hidden");
      signupForm.classList.add("hidden");
    }

    function showSignup() {
      signupForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
    }

    async function loadProfile() {
      const { data: userData } = await supabaseClient.auth.getUser();
      currentUser = userData.user || null;
      if (!currentUser) return null;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      if (error) return null;
      myProfile = data;
      return data;
    }

    async function refreshUsers() {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, username, created_at")
        .order("username", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      usersList.innerHTML = "";
      data.forEach(u => {
        const div = document.createElement("div");
        div.className = "user";
        div.innerHTML = `<strong>@${escapeHtml(u.username)}</strong><div class="muted">${new Date(u.created_at).toLocaleString()}</div>`;
        usersList.appendChild(div);
      });

      if (!data.length) usersList.innerHTML = `<div class="muted">No users found.</div>`;
    }

    function clearMessages() {
      messagesEl.innerHTML = "";
    }

    function renderMessage(m) {
      const el = document.createElement("div");
      const mine = myProfile && m.sender_id === myProfile.id;
      el.className = "msg" + (mine ? " me" : "");
      el.innerHTML = `
        <div class="meta">@${escapeHtml(m.sender_username || "user")} • ${new Date(m.created_at).toLocaleString()}</div>
        <div>${escapeHtml(m.content)}</div>
      `;
      messagesEl.appendChild(el);
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from("messages")
        .select("id, sender_id, content, created_at, sender_username")
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      clearMessages();
      data.forEach(renderMessage);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (channel) await supabaseClient.removeChannel(channel);

      channel = supabaseClient
        .channel("public-chat")
        .on("postgres_changes", {
          event: "INSERT",
          schema: "public",
          table: "messages"
        }, payload => {
          renderMessage(payload.new);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        })
        .subscribe();
    }

    async function handleSignup() {
      setMsg("");
      const username = document.getElementById("signupUsername").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;

      if (!username || !email || !password) return setMsg("Fill in username, email, and password.");

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { username } }
      });

      if (error) return setMsg(error.message);

      const user = data.user;
      if (!user) return setMsg("Signup succeeded, but no user was returned.");

      const { error: profileError } = await supabaseClient.from("profiles").insert({
        id: user.id,
        username
      });

      if (profileError && !profileError.message.includes("duplicate")) {
        return setMsg(profileError.message);
      }

      setMsg("Account created. Log in now.", true);
      showLogin();
    }

    async function handleLogin() {
      setMsg("");
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) return setMsg("Enter email and password.");

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) return setMsg(error.message);
    }

    async function handleLogout() {
      if (channel) await supabaseClient.removeChannel(channel);
      await supabaseClient.auth.signOut();
      clearMessages();
      myProfile = null;
      currentUser = null;
    }

    async function syncAuth() {
      const profile = await loadProfile();
      if (profile) {
        sessionStatus.textContent = `Signed in as @${profile.username}`;
        authView.classList.add("hidden");
        appView.classList.remove("hidden");
        await refreshUsers();
        await loadMessages();
      } else {
        sessionStatus.textContent = "Not signed in";
        authView.classList.remove("hidden");
        appView.classList.add("hidden");
      }
    }

    document.getElementById("showLoginBtn").onclick = showLogin;
    document.getElementById("showSignupBtn").onclick = showSignup;
    document.getElementById("signupBtn").onclick = handleSignup;
    document.getElementById("loginBtn").onclick = handleLogin;
    document.getElementById("logoutBtn").onclick = handleLogout;
    document.getElementById("refreshUsersBtn").onclick = refreshUsers;

    document.getElementById("messageForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!myProfile) return;
      const input = document.getElementById("messageInput");
      const content = input.value.trim();
      if (!content) return;

      const { error } = await supabaseClient.from("messages").insert({
        sender_id: myProfile.id,
        sender_username: myProfile.username,
        content
      });

      if (!error) input.value = "";
      if (error) console.error(error);
    });

    supabaseClient.auth.onAuthStateChange(() => syncAuth());
    syncAuth();
  </script>
</body>
</html>
